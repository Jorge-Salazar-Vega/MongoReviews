<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MongoReviews</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="auth-container">
        <h2>Crear cuenta</h2>
        <div class="card">
            <form id="registerForm">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="50">
                    <div class="form-error" id="nombreError"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <div class="form-error" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required minlength="8">
                    <div class="form-error" id="passwordError"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div class="form-error" id="confirmError"></div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Registrarse</button>
            </form>
        </div>
        <p class="footer-text">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
    <div id="toastContainer"></div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/auth.js"></script>
</body>
</html>
